<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VoteWise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>body { font-family: 'Inter', sans-serif; background-color: #020617; }</style>
</head>
<body class="text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute w-[500px] h-[500px] bg-brand-500/10 rounded-full blur-[150px] -top-40 -left-40"></div>
        <div class="absolute w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-[120px] -bottom-40 -right-40"></div>
    </div>

    <div class="w-full max-w-md relative">
        <a href="/" class="inline-flex items-center gap-2 text-slate-400 hover:text-white mb-8 transition-colors group">
            <i class="fa-solid fa-arrow-left text-sm group-hover:-translate-x-1 transition-transform"></i>
            <span class="text-sm">Back to Home</span>
        </a>

        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/25">
                <i class="fa-solid fa-shield-halved text-white text-xl"></i>
            </div>
            <div>
                <span class="text-2xl font-bold">VoteWise</span><span class="text-brand-400">AI</span>
                <p class="text-xs text-slate-500">Admin Panel</p>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-8">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">Admin Access</h1>
                <p class="text-slate-400 text-sm">Enter your admin credentials</p>
            </div>

            <form id="admin-form" class="space-y-5">
                <div class="input-group">
                    <label class="input-label">Admin Email</label>
                    <input type="email" id="email" required class="input" placeholder="admin@example.com">
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" required class="input" placeholder="Enter password">
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary w-full">
                    <i class="fa-solid fa-lock"></i>
                    Login to Admin
                </button>
            </form>

            <div id="error-msg" class="hidden mt-5 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span></span>
            </div>

            <div id="success-msg" class="hidden mt-5 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-400 text-sm flex items-center gap-2">
                <i class="fa-solid fa-check"></i>
                <span>Login successful! Redirecting...</span>
            </div>
        </div>

        <p class="text-center text-slate-500 text-xs mt-6">
            <i class="fa-solid fa-shield-halved mr-1"></i>
            Secure admin access only. Unauthorized access is prohibited.
        </p>

        <p class="text-center text-slate-400 text-sm mt-4">
            Not an admin?
            <a href="/login" class="text-brand-400 hover:text-brand-300 font-medium">Go to Voter Login</a>
        </p>
    </div>

    <script>
        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            try {
                const res = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    // Store tokens
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('refresh_token', data.data.refresh_token);
                    localStorage.setItem('user_role', 'admin');
                    
                    successDiv.classList.remove('hidden');
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Success!';
                    
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1000);
                } else {
                    errorDiv.querySelector('span').textContent = data.message || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                    btn.innerHTML = '<i class="fa-solid fa-lock"></i> Login to Admin';
                    btn.disabled = false;
                }
            } catch(err) {
                errorDiv.querySelector('span').textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-lock"></i> Login to Admin';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
